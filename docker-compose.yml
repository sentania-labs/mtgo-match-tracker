name: manalog

# MTGO Match Tracker (Manalog) — Docker Compose stack.
#
# Services:
#   db     — PostgreSQL 16 (internal only)
#   app    — FastAPI / uvicorn (internal only, port 8000)
#   caddy  — TLS-terminating reverse proxy (only service published externally)
#
# TLS mode is driven by the TLS_MODE env var (off | manual | auto). See
# services/caddy/entrypoint.sh for how the Caddyfile is generated.
#
# Published ports default to 80/443. Override with HTTP_PORT/HTTPS_PORT
# (e.g. HTTP_PORT=8080 HTTPS_PORT=8443 for lab deployments that can't
# bind to privileged ports).

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtgo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: mtgo_tracker
    volumes:
      - manalog-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtgo -d mtgo_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ${MANALOG_APP_IMAGE:-manalog-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No host ports — Caddy fronts all external traffic.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://mtgo:${DB_PASSWORD:-changeme}@db/mtgo_tracker}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      TOPDECK_API_KEY: ${TOPDECK_API_KEY:-}
      # Seed the initial user on first boot (when the users table is empty).
      # Safe to remove from the env after the user exists; bootstrap is a no-op
      # whenever the table has rows.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: ${MANALOG_CADDY_IMAGE:-manalog-caddy:latest}
    build:
      context: .
      dockerfile: services/caddy/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      TLS_MODE: ${TLS_MODE:-off}
      TLS_DOMAIN: ${TLS_DOMAIN:-}
      HTTPS_PORT: ${HTTPS_PORT:-443}
    volumes:
      - manalog-certs:/certs:ro          # manual-mode cert + key live here
      - caddy-data:/data                # Let's Encrypt ACME state
      - caddy-config:/config            # Caddy's own runtime config dir
    depends_on:
      - app

volumes:
  manalog-db:
    name: manalog-db
  manalog-certs:
    name: manalog-certs
  caddy-data:
    name: manalog-caddy-data
  caddy-config:
    name: manalog-caddy-config

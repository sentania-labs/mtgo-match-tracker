name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: [self-hosted, linux, generic]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check app/ tests/ agent/

  typecheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: [self-hosted, linux, generic]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install typecheck deps
        run: |
          pip install mypy sqlalchemy-stubs
          pip install -r requirements.txt

      - name: mypy
        run: mypy app/ --ignore-missing-imports --explicit-package-bases

  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: [self-hosted, linux, generic]
    env:
      DATABASE_URL: sqlite+aiosqlite:///:memory:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: |
          pip install 'pytest>=8,<9' 'pytest-asyncio>=0.23,<1.0' 'pytest-cov>=5,<8' 'httpx>=0.27' 'aiosqlite>=0.20' 'pytest-timeout>=2.0'
          pip install -r requirements.txt

      - name: pytest
        run: pytest tests/ -v --cov=app --cov-fail-under=70 --timeout=60

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  release-app:
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API_KEY }}

      - name: Derive semver
        id: semver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push manalog-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sentania-labs/manalog-app:${{ steps.semver.outputs.version }}
            ghcr.io/sentania-labs/manalog-app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Prune dangling images
        if: always()
        run: docker image prune -f

  release-caddy:
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API_KEY }}

      - name: Derive semver
        id: semver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push manalog-caddy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sentania-labs/manalog-caddy:${{ steps.semver.outputs.version }}
            ghcr.io/sentania-labs/manalog-caddy:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

      - name: Prune dangling images
        if: always()
        run: docker image prune -f

  build-agent-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Bake version into agent/__init__.py
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          (Get-Content agent/__init__.py) -replace '__version__ = ".*"', "__version__ = '$version'" | Set-Content agent/__init__.py
          Write-Host "Baked version: $version"
          Get-Content agent/__init__.py

      - name: Bake build date into agent/_build_date.py
        shell: pwsh
        run: |
          $buildDate = Get-Date -Format yyyy-MM-dd
          Set-Content agent/_build_date.py "BUILD_DATE = '$buildDate'`n"
          Write-Host "Baked build date: $buildDate"
          Get-Content agent/_build_date.py

      - name: Build exe
        run: pyinstaller --onefile --windowed --name Manalog --icon=agent/icons/identity.ico --add-data "agent/icons;agent/icons" agent/main.py

      - name: Generate checksum
        run: |
          (Get-FileHash dist\Manalog.exe -Algorithm SHA256).Hash.ToLower() `
            | Out-File -NoNewline -Encoding ASCII dist\Manalog.exe.sha256
        shell: pwsh

      - name: Install WiX v5 (pinned — v7 requires OSMF EULA)
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: .\installer\build.ps1 -SourceDir dist -OutputDir installer\dist -Arch x64
        shell: pwsh

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent-release
          path: |
            dist/Manalog.exe
            dist/Manalog.exe.sha256
            installer/dist/Manalog.msi
            installer/dist/Manalog.msi.sha256
          retention-days: 1

  create-release:
    needs: [release-app, release-caddy, build-agent-release]
    runs-on: [self-hosted, linux, generic]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows agent artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-agent-release
          path: .

      - name: Verify release assets exist at expected paths
        run: |
          set -euo pipefail
          for f in dist/Manalog.exe dist/Manalog.exe.sha256 \
                   installer/dist/Manalog.msi installer/dist/Manalog.msi.sha256; do
            test -s "$f" || { echo "missing/empty: $f"; exit 1; }
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            dist/Manalog.exe
            dist/Manalog.exe.sha256
            installer/dist/Manalog.msi
            installer/dist/Manalog.msi.sha256

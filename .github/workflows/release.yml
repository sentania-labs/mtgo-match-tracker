name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  release-app:
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive semver
        id: semver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push tamiyo-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sentania-labs/tamiyo-app:${{ steps.semver.outputs.version }}
            ghcr.io/sentania-labs/tamiyo-app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Prune dangling images
        if: always()
        run: docker image prune -f

  release-caddy:
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive semver
        id: semver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push tamiyo-caddy
        uses: docker/build-push-action@v5
        with:
          context: services/caddy
          file: services/caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sentania-labs/tamiyo-caddy:${{ steps.semver.outputs.version }}
            ghcr.io/sentania-labs/tamiyo-caddy:latest
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

      - name: Prune dangling images
        if: always()
        run: docker image prune -f

  build-agent-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name MTGOMatchTracker agent/main.py

      - name: Generate checksum
        run: certutil -hashfile dist\MTGOMatchTracker.exe SHA256 > dist\MTGOMatchTracker.exe.sha256

      - name: Upload artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent-release
          path: |
            dist/MTGOMatchTracker.exe
            dist/MTGOMatchTracker.exe.sha256
          retention-days: 1

  create-release:
    needs: [release-app, release-caddy, build-agent-release]
    runs-on: [self-hosted, linux, generic]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows agent artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-agent-release
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            dist/MTGOMatchTracker.exe
            dist/MTGOMatchTracker.exe.sha256

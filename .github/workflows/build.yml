name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-app:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API_KEY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Multi-arch build (validate, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: manalog-app:ci
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Load amd64 image for tests
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --platform linux/amd64 \
            -t manalog-app:pr \
            -f Dockerfile \
            .

      - name: Trivy scan (CRITICAL/HIGH, fixed only)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manalog-app:pr
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: In-container pytest
        if: github.event_name == 'pull_request'
        run: |
          # Use docker create + cp, NOT bind mounts — runner is DinD.
          CID=$(docker create \
            -e DATABASE_URL=sqlite+aiosqlite:///:memory: \
            manalog-app:pr \
            sh -c "pip install --no-cache-dir 'pytest>=8,<9' 'pytest-asyncio>=0.23,<1.0' 'pytest-cov>=5,<8' 'httpx>=0.27' 'aiosqlite>=0.20' 'pytest-timeout>=2.0' && pytest tests/ -v --cov=app --cov-fail-under=70 --timeout=60")
          docker cp tests/. "$CID:/app/tests/"
          docker cp pyproject.toml "$CID:/app/pyproject.toml" 2>/dev/null || true
          timeout 300 docker start -a "$CID"
          RC=$?
          docker rm "$CID" >/dev/null
          exit $RC

      - name: Cleanup PR image
        if: always() && github.event_name == 'pull_request'
        run: docker rmi manalog-app:pr || true

  build-caddy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: [self-hosted, linux, docker]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API_KEY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Multi-arch build (validate, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: manalog-caddy:ci
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  compose-smoke-test:
    needs: [build-app, build-caddy]
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs')
      && github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_API_KEY }}

      - name: Build app image (smoke tag)
        run: docker build --platform linux/amd64 -t manalog-app:smoke -f Dockerfile .

      - name: Build caddy image (smoke tag)
        run: docker build --platform linux/amd64 -t manalog-caddy:smoke -f services/caddy/Dockerfile .

      - name: Seed .env
        run: |
          # HTTP_PORT/HTTPS_PORT overridden to high ports so smoke runs
          # don't collide with anything bound to 80/443 on the runner.
          cat > .env <<'EOF'
          TLS_MODE=off
          DATABASE_URL=postgresql+asyncpg://mtgo:test@db/mtgo_tracker
          DB_PASSWORD=test
          SECRET_KEY=test-secret-key-32chars-minimum
          HTTP_PORT=18080
          HTTPS_PORT=18443
          EOF

      - name: Pre-cleanup (remove any stale stack from prior runs)
        run: docker compose down -v --remove-orphans 2>/dev/null || true

      - name: Bring up stack
        run: |
          export MANALOG_APP_IMAGE=manalog-app:smoke
          export MANALOG_CADDY_IMAGE=manalog-caddy:smoke
          docker compose up -d --no-build

      - name: Poll /healthz
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T app curl -fsS http://localhost:8000/healthz > /dev/null; then
              echo "healthz ok after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "healthz never returned 200 within 60s"
          docker compose logs app
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

      - name: Cleanup smoke images
        if: always()
        run: docker rmi manalog-app:smoke manalog-caddy:smoke || true

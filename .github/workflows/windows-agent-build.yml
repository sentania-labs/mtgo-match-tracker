name: Windows Agent Build (PR)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-agent:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == 'sentania-labs'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name MTGOMatchTracker agent/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: dist/MTGOMatchTracker.exe
          retention-days: 30
